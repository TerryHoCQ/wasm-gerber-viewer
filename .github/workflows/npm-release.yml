name: Publish npm Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify release tag matches package version
        run: |
          package_version="$(node -p "require('./packages/gerber-renderer/package.json').version")"
          if [[ "$RELEASE_TAG" != "v$package_version" ]]; then
            echo "Release tag $RELEASE_TAG does not match package version v$package_version" >&2
            exit 1
          fi

      - name: Publish package to npmjs
        working-directory: packages/gerber-renderer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token || secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@dsafdsaf132"

      - name: Prepare GitHub Packages metadata
        working-directory: packages/gerber-renderer
        run: |
          npm pkg set name="@dsafdsaf132/wasm-gerber-renderer"
          npm pkg set publishConfig.registry="https://npm.pkg.github.com"

      - name: Publish package to GitHub Packages
        working-directory: packages/gerber-renderer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
