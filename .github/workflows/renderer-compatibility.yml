name: Renderer Compatibility

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/renderer-compatibility.yml"
      - "demo/*.gbr"
      - "demo/*.drl"
      - "packages/wasm-gerber-renderer/**"
      - "scripts/assert-png-content.mjs"
      - "scripts/vercel-build.sh"
      - "rust-toolchain.toml"
      - "wasm/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/renderer-compatibility.yml"
      - "demo/*.gbr"
      - "demo/*.drl"
      - "packages/wasm-gerber-renderer/**"
      - "scripts/assert-png-content.mjs"
      - "scripts/vercel-build.sh"
      - "rust-toolchain.toml"
      - "wasm/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_DIR: packages/wasm-gerber-renderer

jobs:
  pack:
    name: Pack local renderer package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      - name: Pack package with bundled WASM
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/renderer-package"
          mkdir -p "$artifact_dir"
          npm pack --pack-destination "$artifact_dir"

      - name: Upload package tarball
        uses: actions/upload-artifact@v4
        with:
          name: wasm-gerber-renderer-package
          path: ${{ runner.temp }}/renderer-package/*.tgz
          if-no-files-found: error
          retention-days: 7

  smoke:
    name: ${{ matrix.platform }}
    needs: pack
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux x64
            runner: ubuntu-latest
            runtime_smoke: true
          - platform: Linux arm64
            runner: ubuntu-24.04-arm
            runtime_smoke: true
          - platform: macOS arm64
            runner: macos-latest
            runtime_smoke: true
          - platform: macOS x64
            runner: macos-15-intel
            runtime_smoke: false
          - platform: Windows x64
            runner: windows-latest
            runtime_smoke: true
          - platform: Windows arm64
            runner: windows-11-arm
            runtime_smoke: true

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      - name: Install Linux build headers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libx11-dev libxext-dev xvfb

      - name: Download package tarball
        uses: actions/download-artifact@v4
        with:
          name: wasm-gerber-renderer-package
          path: renderer-package

      - name: Install renderer and node-gles-webgl2
        env:
          NODE_GLES_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          smoke_dir="${RUNNER_TEMP}/renderer-smoke"
          mkdir -p "$smoke_dir"
          cd "$smoke_dir"
          npm init -y
          package_file="$(node -e "const { resolve } = require('node:path'); const { readdirSync } = require('node:fs'); const dir = resolve(process.env.GITHUB_WORKSPACE, 'renderer-package'); const file = readdirSync(dir).find((name) => name.endsWith('.tgz')); if (!file) process.exit(1); console.log(resolve(dir, file));")"
          npm install "$package_file" node-gles-webgl2@latest

      - name: Check native WebGL2 context
        if: matrix.runtime_smoke != false
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/renderer-smoke"
          node_cmd=(node)
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            node_cmd=(xvfb-run -a node)
          fi
          "${node_cmd[@]}" <<'NODE'
          const nodeGles = require("node-gles-webgl2");
          const gl = nodeGles.createWebGLRenderingContext({
            width: 64,
            height: 64,
            majorVersion: 3,
            minorVersion: 0,
          });
          const required = [
            "bindVertexArray",
            "drawArraysInstanced",
            "vertexAttribDivisor",
            "readPixels",
          ];
          const missing = required.filter((name) => typeof gl[name] !== "function");
          if (missing.length > 0) {
            throw new Error(`Missing WebGL2 methods: ${missing.join(", ")}`);
          }
          gl.clearColor(0.25, 0.5, 0.75, 1);
          gl.clear(gl.COLOR_BUFFER_BIT);
          const pixel = new Uint8Array(4);
          gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixel);
          if (pixel[3] === 0) {
            throw new Error("readPixels returned a transparent pixel after clear");
          }
          if (typeof gl.destroy === "function") {
            gl.destroy();
          } else {
            gl.dispose?.();
          }
          NODE

      - name: Render through CLI
        if: matrix.runtime_smoke != false
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/renderer-smoke"
          input_file="$(node -e "console.log(require('node:path').resolve(process.env.GITHUB_WORKSPACE, 'demo/performance-test-stars-1K.gbr'))")"
          renderer_cmd=(npx --no-install gerber-renderer)
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            renderer_cmd=(xvfb-run -a "${renderer_cmd[@]}")
          fi
          "${renderer_cmd[@]}" \
            "$input_file" \
            --output out-cli.png \
            --width 640 \
            --height 360 \
            --background '#05070c' \
            --alpha 1
          node "${GITHUB_WORKSPACE}/scripts/assert-png-content.mjs" out-cli.png '#05070c' 100 640 360

      - name: Render through Node API
        if: matrix.runtime_smoke != false
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/renderer-smoke"
          cat > smoke-node.mjs <<'NODE'
          import { fileLayer, renderGerberToPngBuffer } from "wasm-gerber-renderer/node";
          import { writeFile } from "node:fs/promises";
          import { resolve } from "node:path";

          const png = await renderGerberToPngBuffer(
            [
              fileLayer(resolve(process.env.GITHUB_WORKSPACE, "demo/gerber-feature-test.gbr")),
              fileLayer(resolve(process.env.GITHUB_WORKSPACE, "demo/gerber-feature-test.gbr"), {
                name: "inverted-mask.gbs",
                inverted: true,
                offsetX: 80,
              }),
              fileLayer(resolve(process.env.GITHUB_WORKSPACE, "demo/smoke-test.drl"), {
                kind: "drill",
                offsetX: 160,
              }),
            ],
            {
              width: 640,
              height: 360,
              background: "#ffffff",
              globalAlpha: 1,
              invertedOutline: "bounds",
            },
          );

          if (!(png instanceof Uint8Array)) throw new Error("Node API did not return bytes");
          await writeFile("out-node.png", png);
          NODE
          node_cmd=(node)
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            node_cmd=(xvfb-run -a node)
          fi
          "${node_cmd[@]}" smoke-node.mjs
          node "${GITHUB_WORKSPACE}/scripts/assert-png-content.mjs" out-node.png '#ffffff' 100 640 360

      - name: Validate build-only platform
        if: matrix.runtime_smoke == false
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/renderer-smoke"
          node <<'NODE'
          const nodeGles = require("node-gles-webgl2");
          if (typeof nodeGles.createWebGLRenderingContext !== "function") {
            throw new Error("node-gles-webgl2 native module did not load");
          }
          console.log("Native module loaded; runtime smoke is unavailable on this hosted runner");
          NODE
