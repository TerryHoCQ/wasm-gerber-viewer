<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASM Gerber Viewer</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="drop-zone" class="app-shell">
      <header class="top-toolbar" aria-label="Workspace toolbar">
        <div class="brand-lockup">
          <span class="brand-mark"></span>
          <div>
            <h1>Gerber Viewer</h1>
            <span id="workspace-status">Ready</span>
          </div>
        </div>

        <div class="toolbar-group primary-actions">
          <button type="button" class="tool-button primary" id="select-files-btn">
            <i data-lucide="folder-open"></i>
            <span>Open</span>
          </button>
          <input
            type="file"
            id="file-input"
            multiple
            accept="text/*,.gdo,.gbr,.ger,.art,.gtl,.gbl,.gts,.gbs,.gto,.gbo,.gtp,.gbp,.cmp,.drd,.gko,.plc,.sol,.stc,.sts"
          />
          <button type="button" class="tool-button" id="fit-view-btn">
            <i data-lucide="scan"></i>
            <span>Fit</span>
          </button>
          <button
            type="button"
            class="icon-button"
            id="canvas-theme-toggle"
            aria-label="Switch to white canvas"
            aria-pressed="false"
            title="Switch to white canvas"
          >
            <i data-lucide="sun"></i>
          </button>
          <button
            type="button"
            class="icon-button"
            id="screenshot-btn"
            aria-label="Export screenshot"
            title="Export screenshot"
          >
            <i data-lucide="camera"></i>
          </button>
          <button
            type="button"
            class="icon-button"
            id="ruler-toggle-btn"
            aria-label="Enable ruler"
            aria-pressed="false"
            title="Enable ruler"
          >
            <i data-lucide="ruler"></i>
          </button>
          <button
            type="button"
            class="icon-button"
            id="ruler-clear-btn"
            aria-label="Clear ruler measurements"
            title="Clear ruler measurements"
            disabled
          >
            <i data-lucide="eraser"></i>
          </button>
          <button
            type="button"
            class="unit-toggle"
            id="measurement-unit-toggle"
            aria-label="Show measurements in inches"
            title="Show measurements in inches"
          >
            mm
          </button>
        </div>

        <div class="toolbar-group view-actions">
          <button
            type="button"
            class="icon-button"
            id="drawer-toggle"
            aria-label="Hide panel"
            aria-expanded="true"
            title="Hide panel"
          >
            <i data-lucide="panel-right-close"></i>
          </button>
          <button
            type="button"
            class="icon-button"
            id="fullscreen-btn"
            aria-label="Enter fullscreen"
            title="Enter fullscreen"
          >
            <i data-lucide="maximize-2"></i>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="viewer-surface" aria-label="Gerber canvas">
          <canvas id="gerber-canvas"></canvas>
          <svg
            class="measurement-overlay"
            id="measurement-overlay"
            aria-hidden="true"
          ></svg>

          <div class="empty-state" id="empty-state">
            <div class="empty-state-icon"><i data-lucide="layers-3"></i></div>
            <strong>No Layers Loaded</strong>
            <button type="button" class="tool-button primary" id="empty-upload-btn">
              <i data-lucide="folder-open"></i>
              <span>Open Files</span>
            </button>
          </div>

          <div class="drop-overlay" id="drop-overlay">
            <i data-lucide="file-up"></i>
            <span>Drop Files</span>
          </div>

          <div class="viewport-hud">
            <div class="metric-pill">
              <i data-lucide="layers"></i>
              <span id="visible-layer-count">0 / 0</span>
            </div>
            <div class="metric-pill">
              <i data-lucide="search"></i>
              <span id="zoom-readout">100%</span>
            </div>
          </div>

          <footer class="canvas-status">
            <span id="cursor-readout">0.000, 0.000</span>
            <span id="bounds-readout">No bounds</span>
          </footer>
        </section>

        <aside class="side-panel" id="drawer" aria-label="Layer and diagnostics panel">
          <div class="resize-handle" id="resize-handle" aria-label="Resize panel"></div>

          <nav class="panel-tabs" aria-label="Panel sections">
            <button type="button" class="panel-tab active" data-panel-tab="layers">
              <i data-lucide="layers"></i>
              <span>Layers</span>
            </button>
            <button type="button" class="panel-tab" data-panel-tab="files">
              <i data-lucide="files"></i>
              <span>Files</span>
            </button>
            <button type="button" class="panel-tab" data-panel-tab="filter">
              <i data-lucide="list-filter"></i>
              <span>Filter</span>
            </button>
            <button type="button" class="panel-tab" data-panel-tab="diagnostics">
              <i data-lucide="circle-alert"></i>
              <span>Diagnostics</span>
              <span class="tab-badge" id="diagnostics-count">0</span>
            </button>
          </nav>

          <div class="panel-content">
            <section class="panel-section active" data-panel="layers">
              <div class="layer-panel-controls">
                <div class="section-toolbar">
                  <button class="chip-button" id="select-all-btn" type="button">
                    <i data-lucide="check-check"></i>
                    <span>All</span>
                  </button>
                  <button class="chip-button" id="select-front-btn" type="button">
                    <i data-lucide="panel-top"></i>
                    <span>Front</span>
                  </button>
                  <button class="chip-button" id="select-back-btn" type="button">
                    <i data-lucide="panel-bottom"></i>
                    <span>Back</span>
                  </button>
                  <button class="chip-button" id="unselect-all-btn" type="button">
                    <i data-lucide="eye-off"></i>
                    <span>None</span>
                  </button>
                  <button class="chip-button danger" id="clear-all-btn" type="button">
                    <i data-lucide="trash-2"></i>
                    <span>Clear</span>
                  </button>
                </div>
                <div class="alpha-control">
                  <label class="field-row" for="alpha-slider">
                    <span>Global Alpha</span>
                    <strong id="alpha-value">70%</strong>
                  </label>
                  <input type="range" id="alpha-slider" min="0" max="100" value="70" />
                </div>
              </div>
              <div class="layer-list-scroll">
                <ul class="layer-list" id="layer-list"></ul>
              </div>
            </section>

            <section class="panel-section" data-panel="files">
              <div class="info-grid">
                <div>
                  <span>Loaded</span>
                  <strong id="loaded-file-count">0</strong>
                </div>
                <div>
                  <span>Visible</span>
                  <strong id="visible-file-count">0</strong>
                </div>
              </div>
              <div class="file-note">
                <span>Max file size</span>
                <strong>300 MB</strong>
              </div>
              <ol class="file-list" id="file-list"></ol>
            </section>

            <section class="panel-section" data-panel="filter">
              <div class="filter-form">
                <label class="filter-field" for="front-filter-input">
                  <span>Front</span>
                  <input
                    type="text"
                    id="front-filter-input"
                    autocomplete="off"
                    spellcheck="false"
                  />
                </label>
                <label class="filter-field" for="back-filter-input">
                  <span>Back</span>
                  <input
                    type="text"
                    id="back-filter-input"
                    autocomplete="off"
                    spellcheck="false"
                  />
                </label>
                <p class="filter-note">
                  Use comma or space separated text. Matching is case-insensitive.
                </p>
              </div>
            </section>

            <section class="panel-section" data-panel="diagnostics">
              <div
                id="file-size-warning"
                class="notification"
                role="status"
                aria-live="polite"
              >
                <div>
                  <strong id="warning-title">Notice</strong>
                  <div id="warning-message"></div>
                </div>
                <button
                  type="button"
                  class="icon-button"
                  data-notification-close
                  aria-label="Close"
                >
                  <i data-lucide="x"></i>
                </button>
              </div>
              <ul class="diagnostic-list" id="diagnostic-list"></ul>
            </section>

          </div>
        </aside>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script type="module">
      import { GerberViewer } from "./js/main.js";

      const app = new GerberViewer();
      app.init().catch(console.error);
    </script>
  </body>
</html>
